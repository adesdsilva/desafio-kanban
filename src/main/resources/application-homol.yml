# 🔵 Configurações específicas para HOMOL
# Arquivo: application-homol.yml
# Ativar com: -Dspring.profiles.active=homol

spring:
  application:
    name: kanban-project-saas-homol

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/kanban_homol
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false

server:
  port: 8080
  servlet:
    context-path: /api

app:
  environment: homol
  debug: false

logging:
  level:
    root: WARN
    br.com.setecolinas.kanban_project: INFO
  file:
    name: logs/kanban-homol.log
    max-size: 10MB
    max-history: 10

